apiVersion: apps/v1
kind: Deployment
metadata:
  name: mibanco-app
  labels:
    app: mibanco-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mibanco-app
  template:
    metadata:
      labels:
        app: mibanco-app
    spec:
      containers:
      - name: mibanco-app
        image: ${AZURE_REGISTRY_LOGIN_SERVER}/mibanco-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5