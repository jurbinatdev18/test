apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mibanco-app-ingress
  labels:
    app: mibanco-app
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: mibanco-app.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mibanco-app-service
            port:
              number: 80