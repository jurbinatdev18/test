name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: test-app

jobs:
  ci_job:
    runs-on: ubuntu-latest
    env:
      PORT: 3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install


  build_and_push:
    needs: ci_job
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          severity: HIGH,MEDIUM,LOW,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          output: trivy-results.json
          format: json

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Summarize Trivy results
        shell: bash
        run: |
          critical=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          high=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          medium=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)
          low=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results.json)
          unknown=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="UNKNOWN")] | length' trivy-results.json)

          echo "========================================="
          echo "Trivy Vulnerability Summary"
          echo "========================================="
          echo "CRITICAL : $critical"
          echo "HIGH     : $high"
          echo "MEDIUM   : $medium"
          echo "LOW      : $low"
          echo "UNKNOWN  : $unknown"
          echo "========================================="

          # Fail only if HIGH or CRITICAL vulnerabilities exist
          if [ "$critical" -gt 0 ] || [ "$high" -gt 0 ]; then
            echo "❌ HIGH or CRITICAL vulnerabilities detected."
            exit 1
          fi

          echo "✅ No HIGH or CRITICAL vulnerabilities detected."
